<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Panel | EcoSmart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Consistent Brand Colors */
            --brand-primary: #2563eb;
            --brand-primary-soft: #dbeafe;
            --brand-success: #059669;
            --brand-warning: #d97706;
            --brand-danger: #dc2626;
            
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-heading: #0f172a;
            --text-body: #334155;
            --text-muted: #64748b;
            --border-base: #e2e8f0;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius-md: 10px;
            --radius-lg: 16px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            line-height: 1.6;
        }

        /* Navigation */
        .nav {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-base);
            padding: 0.75rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-brand { 
            font-size: 1.125rem; 
            font-weight: 700; 
            color: var(--brand-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn {
            color: var(--brand-danger);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .logout-btn:hover {
            background: #fee2e2;
        }

        .container {
            max-width: 1100px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
        }

        /* Top Action Section */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-base);
            box-shadow: var(--shadow-sm);
        }

        .small-header {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-heading);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Form Elements */
        .form-row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-base);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 4px var(--brand-primary-soft);
        }

        .btn {
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary { background: var(--brand-primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }

        .btn-success { background: var(--brand-success); color: white; width: 100%; margin-top: 0.5rem; }
        .btn-success:hover { background: #047857; }

        /* Bins Grid */
        .section-header {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-heading);
            margin-bottom: 1.5rem;
        }

        .bins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .bin-card {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            transition: var(--transition);
        }

        .bin-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .bin-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .bin-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-heading);
        }

        .status-badge {
            background: var(--bg-main);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            border: 1px solid var(--border-base);
        }

        /* Progress Bar */
        .progress-container {
            margin: 0.5rem 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        .progress-bar-bg {
            height: 10px;
            background: var(--border-base);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            transition: width 0.6s ease;
        }

        @media (max-width: 600px) {
            .nav { padding: 1rem; }
            .form-row { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>

<body>

    <nav class="nav">
        <div class="nav-brand">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
            EcoSmart User
        </div>
        <a href="/logout" class="logout-btn">Log Out</a>
    </nav>

    <div class="container">

        <div class="actions-grid">
            <div class="card">
                <h3 class="small-header">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
                    Register New Bin
                </h3>
                <form method="POST" action="/add_bin" class="form-row">
                    <input name="location" placeholder="Bin Location (e.g. Backyard)" required>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>

            <div class="card">
                <h3 class="small-header">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    Filter List
                </h3>
                <form method="GET" action="/user" class="form-row">
                    <input name="search" placeholder="Search by name..." value="{{ request.args.get('search','') }}">
                    <button type="submit" class="btn btn-outline" style="border: 1px solid var(--border-base)">Search</button>
                </form>
            </div>
        </div>

        <h2 class="section-header">Your Waste Units</h2>
        
        <div class="bins-grid">
            {% for bin in bins %}
            <div class="card bin-card">
                <div class="bin-header">
                    <div class="bin-title">{{ bin[1] }}</div>
                    <span class="status-badge">{{ bin[3] }}</span>
                </div>

                <div class="progress-container">
                    <div class="progress-label">
                        <span>Fill Level</span>
                        <span style="font-weight: 700;">{{ bin[2] }}%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: {{ bin[2] }}%; 
                             background-color: {% if bin[2]|int > 80 %}var(--brand-danger){% elif bin[2]|int > 50 %}var(--brand-warning){% else %}var(--brand-success){% endif %};">
                        </div>
                    </div>
                </div>

                <form method="POST" action="/update_bin/{{ bin[0] }}" style="margin-top: auto;">
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px;">Manually update level:</div>
                    <div class="form-row" style="gap: 8px;">
                        <input name="fill_level" type="number" placeholder="%" required min="0" max="100">
                        <button type="submit" class="btn btn-primary" style="padding: 0.5rem 1rem;">Update</button>
                    </div>
                </form>
            </div>
            {% endfor %}

            {% if bins|length == 0 %}
            <div class="card" style="grid-column: 1 / -1; text-align: center; padding: 4rem 2rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">🗑️</div>
                <h3 style="color: var(--text-heading);">No bins found</h3>
                <p style="color: var(--text-muted);">Start by adding a new bin location above.</p>
            </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
